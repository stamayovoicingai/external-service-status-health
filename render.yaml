# Blueprint de Render para el backend (servidor de polling).
# Render → New → Blueprint → conecta este repo. Las variables marcadas
# sync:false se rellenan en el dashboard (NO se guardan en el repo).
services:
  - type: web
    name: external-service-health-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DEFAULT_INTERVAL_SECONDS
        value: "60"
      # Qdrant (tu instancia)
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_CHECK_CLUSTER
        value: "true"
      # Synthetic de cuenta (opcionales)
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SONIOX_API_KEY
        sync: false
      # Notificaciones (opcionales)
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
